<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#004B8D"/>
    </linearGradient>
  </defs>

  <!-- Rounded-rect background (Apple icon shape ~22% radius) -->
  <rect width="1024" height="1024" rx="226" ry="226" fill="url(#bg)"/>

  <!-- Subtle grid rows (Dataverse table metaphor) -->
  <rect x="148" y="448" width="728" height="52" rx="10" fill="#fff" fill-opacity="0.11"/>
  <rect x="148" y="528" width="728" height="52" rx="10" fill="#fff" fill-opacity="0.07"/>
  <rect x="148" y="608" width="728" height="52" rx="10" fill="#fff" fill-opacity="0.07"/>
  <rect x="148" y="688" width="728" height="52" rx="10" fill="#fff" fill-opacity="0.07"/>

  <!-- Subtle vertical column divider -->
  <rect x="398" y="420" width="4" height="360" rx="2" fill="#fff" fill-opacity="0.13"/>

  <!-- VK — bold display text -->
  <text x="512" y="415"
        font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
        font-size="330" font-weight="800"
        fill="#fff" fill-opacity="0.97"
        text-anchor="middle" dominant-baseline="auto">VK</text>

  <!-- KIT — lightweight subtitle -->
  <text x="512" y="785"
        font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
        font-size="130" font-weight="200"
        fill="#fff" fill-opacity="0.82"
        text-anchor="middle" dominant-baseline="auto"
        letter-spacing="18">KIT</text>
</svg>
