<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- VerseKit app icon: dotted "global data" globe with the VERSE wordmark
       spaced wide across the centre so it reads as the equator line.
       Source of truth is scripts/create-icon.py (Pillow), which renders the
       AppIcon-1024.png used to build AppIcon.icns. This SVG mirrors that design. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4DA8FF"/>
      <stop offset="1" stop-color="#0A57D0"/>
    </linearGradient>
    <radialGradient id="sphere" cx="0.4" cy="0.34" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="0.7" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </radialGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.0" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="squircle"><rect x="0" y="0" width="1024" height="1024" rx="226" ry="226"/></clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
    <circle cx="512" cy="512" r="331" fill="url(#sphere)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#sheen)"/>

    <g fill="none" stroke="#FFFFFF" stroke-width="17" stroke-linecap="round" stroke-dasharray="0.5 41">
      <circle cx="512" cy="512" r="331" opacity="0.68"/>
      <ellipse cx="512" cy="512" rx="126" ry="331" opacity="0.55"/>
      <ellipse cx="512" cy="362" rx="268" ry="71" stroke-width="15" opacity="0.41"/>
      <ellipse cx="512" cy="662" rx="268" ry="71" stroke-width="15" opacity="0.41"/>
    </g>

    <text x="512" y="512" text-anchor="middle" dominant-baseline="central"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="141" font-weight="700" letter-spacing="36" fill="#FFFFFF">VERSE</text>
  </g>
</svg>
